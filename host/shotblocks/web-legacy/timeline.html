<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shotblocks v2</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="icons.css" />
<style>
  /* Bundled Inter — matches the Figma typography spec. The font files
     live under web/fonts/ and ship with the plugin. */
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: block;
    src: url('fonts/Inter-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: block;
    src: url('fonts/Inter-SemiBold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 700;
    font-display: block;
    src: url('fonts/Inter-Bold.woff2') format('woff2');
  }
</style>
<style>
  :root {
    color-scheme: dark;

    --topbar-h:    26px;
    --utilstrip-h: 39px;     /* Logo + Utilities strip above headers + ruler */
    --rail-w:      50px;     /* Tool palette column */
    --headers-w:   200px;    /* Track header column (Figma: 200) */
    --ruler-h:     39px;
    --track-h:     65px;     /* Track row height (Figma: 65) — base height */
    --video-track-h: 65px;   /* Per-side height, driven by vertical zoom */
    --audio-track-h: 65px;
    --va-divider-h: 4px;       /* visible gap; borders are NOT inside this */
    /* Scrollbar gutter is 4px wider/taller than the visible pill, so the
       pill has 4px breathing room from the dialog edge. */
    --scrollbar-sz:      19px;    /* gutter width/height (pill + 4px pad) */
    --scrollbar-pill-sz: 15px;    /* visible pill thickness */
    --scrollbar-end-sz:  15px;    /* end-dot diameter */
    --scrollbar-end-inset: 0px;   /* extra inset past dot-radius. 0 = dot
                                     outer edge flush with pill end. */

    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--color-grey-10);
    color: var(--color-grey-white);
    height: 100%; overflow: hidden;
  }
  * { box-sizing: border-box; }

  /* ============================================================ layout
   *
   * .app          column flex, fills viewport
   *   .topbar     full-width timecode bar
   *   .body       row flex, grows to fill
   *     .rail       tool palette (50)
   *     .headers    track header column (150) [contains Utilities strip + headers]
   *     .stage      main area: ruler + lanes + playhead + bottom h-scrollbar
   *     .v-gutter   right column: video v-scrollbar (above divider), audio v-scrollbar (below)
   */

  .app {
    display: flex; flex-direction: column;
    height: 100vh; width: 100vw;
  }

  /* ---- top bar ---- */

  .topbar {
    flex: 0 0 var(--topbar-h);
    background: var(--color-grey-10);
    border-bottom: 1px solid var(--color-grey-16);
    display: flex; align-items: center;
    padding: 0 11px;
  }
  /* Figma: Inter Regular 14px, primary-highlight blue. No spacing/feature
     overrides; relies on Inter's own digit widths. */
  .topbar__timecode {
    font-family: Inter, sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--color-timeline-primary-highlight);
  }

  /* ---- body ---- */

  .body {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: var(--rail-w) var(--headers-w) 1fr var(--scrollbar-sz);
    grid-template-rows: var(--utilstrip-h) 1fr var(--scrollbar-sz);
    min-height: 0;
  }

  /* row 1: logo            | utilities strip | ruler             | (empty)
     row 2: tool palette    | track headers   | stage (lanes)     | v-gutter
     row 3: (empty)         | (empty)         | h-scrollbar       | (empty)
     Headers + stage share grid-row 2, so their available heights match
     exactly. The h-scrollbar lives in its own row at the bottom of the
     stage column only.
   */

  .logo {
    grid-column: 1; grid-row: 1;
    background: var(--color-grey-12);
    border-right: 1px solid var(--color-grey-16);
    border-bottom: 1px solid var(--color-grey-16);
    display: flex; align-items: center; justify-content: center;
  }
  .logo__mark {
    width: 22px; height: 11px;
    display: block;
  }

  /* Utilities strip — Figma frame 150:1455 (200×39).
     Four icons sit at x centers ≈ 27, 76, 124, 172 within the 200px strip,
     i.e. ~48px between centers. Express that as 48px hit boxes flexed
     from the left with a small ~3px left pad so the first center lands at ~27. */
  .utilstrip {
    grid-column: 2; grid-row: 1;
    background: var(--color-grey-10);
    border-bottom: 1px solid var(--color-grey-16);
    display: flex; align-items: center;
    padding: 0 0 0 3px;
    color: var(--color-grey-50);
    font-size: 11px;
  }
  .utilstrip__icon {
    width: 48px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex: 0 0 auto;
  }
  /* Utility-strip icons default to grey-24 (darker than the rail/track-header
     grey-50 default). Hover lifts to grey-50; active goes to primary highlight. */
  .utilstrip__icon .icon { background-color: var(--color-grey-24); }
  .utilstrip__icon:hover .icon { background-color: var(--color-grey-50); }
  .utilstrip__icon.is-active .icon { background-color: var(--color-timeline-primary-highlight); }

  /* Ruler lives in the stage column; an inner band matches the 4px right
     inset of .lanes-area so ruler ticks and the playhead derive from the
     exact same pixel width (lanes-area width). The outer .ruler-row keeps
     the grey-16 background extended across the full stage column so the
     ruler reads as one continuous bar. */
  .ruler-row {
    grid-column: 3; grid-row: 1;
    background: var(--color-grey-16);
    border-bottom: 1px solid var(--color-grey-16);
    position: relative;
    overflow: hidden;
    z-index: 2;   /* above .headers-shadow so the shadow doesn't bleed up */
  }
  .ruler-row__inner {
    position: absolute;
    inset: 0;             /* match .lanes-area — no inset; both span the
                             full stage column so the V/A seam is
                             continuous across into the v-gutter. */
  }
  .ruler-row__gutter-cap {
    grid-column: 4; grid-row: 1;
    background: var(--color-grey-10);
    border-bottom: 1px solid var(--color-grey-16);
  }
  .ruler__numbers,
  .ruler__ticks {
    position: absolute; left: 0; right: 0;
    pointer-events: none;
  }
  .ruler__numbers { top: 6px;    height: 14px; }
  .ruler__ticks   { bottom: 0;   height: 18px; }
  .ruler__number {
    position: absolute;
    font-size: 10px; line-height: 1;
    color: var(--color-grey-50);
    font-variant-numeric: tabular-nums;
    transform: translateX(-50%);
  }
  /* Figma anchors every tick at the BOTTOM of the ruler's tick strip:
     major ticks extend 18px up, minor ticks 10px up. All bottoms align. */
  .ruler__tick {
    position: absolute; bottom: 0; width: 1px;
    background: var(--color-grey-50);
  }
  .ruler__tick.is-major { height: 18px; opacity: 0.9; }
  .ruler__tick.is-minor { height: 10px; opacity: 0.5; }

  /* ---- rail (tool palette) ---- */

  /* Rail is split vertically into two halves:
       - Top half: tool palette icons (Select / Razor / Pen / Range)
       - Bottom half: dB meter
     Both halves are 50/50, so resizing the dialog scales them together.
     The rail spans grid-rows 2+3 so it extends to the very bottom of the
     body (across the h-scrollbar row), instead of stopping at the bottom
     of the lanes. */
  .rail {
    grid-column: 1; grid-row: 2 / span 2;
    background: var(--color-grey-12);
    border-right: 1px solid var(--color-grey-16);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .rail__tools {
    flex: 1 1 50%;
    min-height: 0;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 16px;
    gap: 26px;
  }
  /* The bars sit near (but slightly right of) the rail center axis to
     keep the dB scale labels comfortably within the rail. */
  .rail__meter-wrap {
    flex: 1 1 50%;
    min-height: 0;
    position: relative;
  }
  .rail__meter-wrap .rail__meter {
    position: absolute;
    top: 0; bottom: 16px;            /* gap between L/R row and rail bottom */
    left: calc(50% - 24px);          /* slight left shift to align with icons */
    height: auto;                    /* override the .rail__meter height:100% */
  }
  .rail__tool {
    width: 28px; height: 28px;
    min-width: 28px; min-height: 28px;
    max-width: 28px; max-height: 28px;
    flex: 0 0 28px;
    box-sizing: border-box;
    padding: 0;
    border: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 6px;
    background: transparent;
    transition: background-color 0.12s ease;
  }
  .rail__tool:hover { background: rgba(255, 255, 255, 0.07); }
  .rail__tool.is-active { background: var(--color-timeline-primary-highlight); }
  /* Icon shape comes from the SVG used as a mask; the actual color is
     a CSS background. Per-icon: define a class .icon--<name> with the
     mask-image URL (generated into icons.css). Per-state: change
     background-color via CSS. */
  .icon {
    display: block;
    width: var(--icon-w, 14px);
    height: var(--icon-h, 14px);
    background-color: var(--color-grey-50);
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
    -webkit-mask-size: contain;
            mask-size: contain;
    transform: rotate(var(--icon-rot, 0deg));
  }

  /* Tool-palette rail icon states:
     default → grey-50 icon (no box)
     hover   → near-white icon, subtle grey rounded box
     active  → white icon, primary-blue rounded box */
  .rail__tool:hover .icon { background-color: var(--color-grey-white); }
  .rail__tool.is-active .icon { background-color: var(--color-grey-white); }

  /* Per-icon mask-image rules live in icons.css (generated; inlines each
     SVG as a data: URL to dodge file:// mask-image quirks in WebView2). */

  /* dB meter — Figma node 154:1270 (Decibel Meter). Two side-by-side
     halves: scale labels + tick column | L/R bars + L/R label row.
     Anchored to the bottom of the wrap and stretches to fill height. */
  .rail__meter {
    width: 39px;
    height: 100%;
    display: flex;
    align-items: stretch;
    color: var(--color-grey-50);
    font-family: Inter, sans-serif;
  }

  /* Left half — scale labels + ticks */
  .rail__meter-scale {
    display: flex;
    align-items: stretch;
    /* Match the bar column height so labels and bars align top-to-bottom.
       The L/R letters row underneath the bars adds ~6px; reserve that. */
    padding-bottom: 9px;
  }
  .rail__meter-scale__labels {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    width: 17.45px;
    padding-right: 3px;
    font-size: 6px;
    font-weight: 400;
    line-height: 1;
    box-sizing: border-box;
  }
  .rail__meter-scale__ticks {
    width: 1px;
    /* Hide for now — the small tick column was clipped/wrong at small
       sizes. Re-enable once the meter has a fixed-enough height. */
    display: none;
  }

  /* Right half — L/R bars + L/R labels */
  .rail__meter-bars {
    width: 18.63px;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .rail__meter-bars__pair {
    flex: 1 1 0;
    display: flex; align-items: center;
    gap: 3px;
    width: 100%;
  }
  .rail__meter-bar {
    width: 7.815px;
    height: 100%;
    background: var(--color-grey-7);
  }
  .rail__meter-bars__lr {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    font-size: 8px;
    line-height: 1;
  }
  .rail__meter-bars__lr span {
    display: block;
  }

  /* ---- track headers column ---- */

  .headers {
    grid-column: 2; grid-row: 2;
    background: var(--color-grey-10);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 2;   /* sits above .headers-shadow so the shadow tucks under it */
  }

  /* Soft shadow that bleeds from the headers' right edge into the lanes
     area. Lives INSIDE .stage so its bleed is clipped to the lanes row
     by the stage's `overflow: hidden`. Implemented as a CSS gradient
     rather than box-shadow — gradients give a true smooth falloff with
     no hard mid-tone band. */
  .stage__edge-shadow {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 60px;
    pointer-events: none;
    background: linear-gradient(to right,
      rgba(0,0,0,0.35) 0%,
      rgba(0,0,0,0.18) 35%,
      rgba(0,0,0,0.06) 70%,
      rgba(0,0,0,0)    100%);
    z-index: 1;
  }

  /* Centred stack pattern: video tracks above the divider grow upward
     (pinned to its top edge), audio tracks below grow downward (pinned
     to its top edge). Mirror in the stage's .lanes-area.
     The divider is draggable — see attachVaSplitter() in the script.
     `--va-video-share` and `--va-audio-share` are flex-grow ratios on
     the slack regions; default 1/1 = centered. JS rewrites them as the
     user drags. Both .headers and .lanes-area read the same vars, so
     the headers + lanes stay vertically locked through every drag. */
  .stack {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .stack__videos {
    flex: 1 1 0;
    min-height: 0;
    flex-grow: var(--va-video-share, 1);
    display: flex; flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }
  .stack__audios {
    flex: 1 1 0;
    min-height: 0;
    flex-grow: var(--va-audio-share, 1);
    display: flex; flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;
  }
  .stack__divider {
    /* 4px visible gap + 1px border-bottom (the only stroke at the V/A
       seam). border-bottom only — track-headers above contribute their
       own border-bottom, lanes below have border-top. This gives 1px
       strokes everywhere instead of doubling at the divider edges. */
    flex: 0 0 var(--va-divider-h);
    background: var(--color-grey-7);
    box-sizing: content-box;     /* keep the 4px visible regardless of border */
    border-bottom: 1px solid var(--color-grey-16);
  }
  /* Both the headers-column divider and the lanes-area divider are
     draggable splitter handles. They write the same :root vars, so the
     two columns stay locked through every drag.
     Hover/drag affordance: full 4px painted with blue dashes on grey-7,
     reading as a "grabbable handle." The divider's own geometry stays
     a clean 4px (no layout shift on hover) and the surrounding lane
     borders sit on top — the lane above contributes its own
     border-bottom (drawn by the lane element, which is a flex sibling
     above us in the document), and the divider's own border-bottom is
     OUTSIDE the 4px background box thanks to box-sizing:content-box. */
  .stack__divider.is-grabbable {
    cursor: ns-resize;
  }
  /* Hover/drag state: full 4px solid primary-highlight blue with a
     diagonal hatch overlay and a 1px darker-blue outline (Figma node
     168:1332). The hatch is a tiled SVG (white lines at 30% opacity,
     ~4.6px pitch, `\` direction). The outline is a 1px #01438B inset
     box-shadow so it doesn't shift the divider's geometry.
     .is-hover is applied to BOTH dividers (headers + lanes) by JS, so
     hovering either span lights up the whole horizontal V/A seam. */
  .stack__divider.is-grabbable.is-dragging,
  .stack__divider.is-grabbable.is-hover {
    background-color: var(--color-timeline-primary-highlight);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='5' viewBox='0 0 5 5'><line x1='5' y1='0' x2='0' y2='5' stroke='%23ffffff' stroke-opacity='0.3' stroke-width='1'/></svg>");
    background-size: 5px 5px;
    background-repeat: repeat;
    box-shadow: inset 0 0 0 1px #01438B;
    /* Keep the border-bottom slot in layout (so hovering doesn't shift
       the lanes by 1px) but make it transparent AND clip the hatched
       background to the padding box so the hatch doesn't paint into
       that 1px border slot. Otherwise the hatch shows through below
       the dark-blue shadow's bottom edge and reads as a doubled stroke. */
    border-bottom-color: transparent;
    background-clip: padding-box;
  }

  /* Track header — Figma nodes 152:1188 (Video) / 152:1208 (Audio).
       200×65 frame, flex justify-between items-center px-[8px].
       Children (in order, each shrink-0):
         twirl  → lock-wrap  → chip-wrap (h-full px-10)  → right-wrap (pl-6 pr-24)
       Chip lives in flow (not absolutely positioned) inside chip-wrap.
   */
  .track-header {
    flex: 0 0 var(--track-h);
    background: var(--color-grey-12);
    border-bottom: 1px solid var(--color-grey-16);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px;
    position: relative;
  }
  .stack__videos .track-header:first-child {
    border-top: 1px solid var(--color-grey-16);
  }

  .track-header__twirl {
    flex: 0 0 auto;
    width: 8px; height: 10px;
    color: var(--color-grey-50);
    display: flex; align-items: center; justify-content: center;
    font-size: 7px;
    user-select: none; cursor: pointer;
  }

  .track-header__lock-wrap {
    flex: 0 0 auto;
    display: flex; align-items: center;
  }

  /* Chip wrapper — full track height, px-10. The chip sits inside,
     full-height and 30px wide. */
  .track-header__chip-wrap {
    flex: 0 0 auto;
    align-self: stretch;
    display: flex; align-items: center;
    padding: 0 10px;
  }
  .track-header__chip {
    width: 30px;
    align-self: stretch;
    border-radius: 4px;
    color: #fff;
    font-family: Inter, sans-serif;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .track-header.is-video .track-header__chip { background: var(--color-timeline-primary-highlight); }
  .track-header.is-audio .track-header__chip { background: var(--color-grey-24); }

  /* Right-side group: pl-6 pr-24, justify-end. Inside is a 28×30 column
     with the eye (or M/S row) on top and the label underneath. */
  .track-header__right {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 24px 0 6px;
  }
  .track-header__right-col {
    width: 28px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
  }
  .track-header.is-audio .track-header__right-col {
    padding: 3px 0;
  }
  .track-header__icons-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 30px;
    color: var(--color-grey-50);
    font-family: Inter, sans-serif;
    font-size: 10px; font-weight: 700;
  }
  .track-header__icons-row .s { color: var(--color-timeline-primary-highlight); }
  .track-header__label-wrap {
    flex: 0 0 auto;
    width: 53px;
    display: flex; align-items: center; justify-content: center;
  }
  .track-header__label {
    font-family: Inter, sans-serif;
    font-size: 10px; font-weight: 400;
    color: var(--color-grey-50);
    line-height: 1; white-space: nowrap;
  }

  /* ---- stage (lanes + playhead + bottom scrollbar) ---- */

  .stage {
    grid-column: 3; grid-row: 2;
    background: var(--color-grey-10);
    position: relative;
    /* overflow:visible so the playhead triangle can float up into the
       ruler row. The edge-shadow clips itself via background gradient
       width, and the lanes-area has its own bg+inset so nothing else
       escapes visibly. */
    overflow: visible;
  }

  /* The lanes-area fills the whole stage so its centered stack lines up
     with the headers column's centered stack (both occupy grid-row 2).
     No right inset — the lanes butt directly against the v-gutter so
     the V/A divider seam is continuous across into the gutter without
     a visible grey-10 gap interrupting it. */
  .lanes-area {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    min-height: 0;
  }

  .lane {
    flex: 0 0 var(--track-h);
    background: var(--color-grey-12);
    border-bottom: 1px solid var(--color-grey-16);
    position: relative;       /* shot blocks position absolutely inside */
    overflow: hidden;         /* clip blocks that extend past the visible window */
  }
  .stack__videos .lane:first-child {
    border-top: 1px solid var(--color-grey-16);
  }
  /* Per-side track height — driven by the vertical scrollbar zoom for
     each side. Video and audio sides resize independently. */
  .stack__videos .lane,
  .track-header.is-video { flex-basis: var(--video-track-h); }
  .stack__audios .lane,
  .track-header.is-audio { flex-basis: var(--audio-track-h); }

  /* Shot block — PLACEHOLDER visual. Real Figma component lands later.
     `left` and `width` are pixel-positioned by JS from the clip's
     inFrame/outFrame against the current horizontal visible window. */
  .shot-block {
    position: absolute;
    top: 4px; bottom: 4px;
    background: var(--color-timeline-primary-highlight);
    border-radius: 4px;
    color: var(--color-grey-white);
    font-family: Inter, sans-serif;
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center;
    padding: 0 8px;
    overflow: hidden;
    white-space: nowrap;
    cursor: grab;
    user-select: none;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
  }
  .shot-block:hover {
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
  }

  /* Bottom horizontal scrollbar — sits in its own grid row under .stage */
  .h-scroll {
    grid-column: 3; grid-row: 3;
    background: var(--color-grey-10);
    position: relative;
    z-index: 2;   /* above .headers-shadow so the shadow doesn't bleed down */
  }
  /* Scrollbar — pill track grey-16, with a dot at each end placed via
     `justify-content: space-between`. Each dot is grey-12 fill with a
     2px grey-24 stroke. Pill is --scrollbar-pill-sz tall and pinned to
     the TOP of the gutter, so the 4px gap sits between the pill and
     the dialog's bottom edge. */
  .scrollbar-track {
    position: absolute;
    left: 0; right: 0;
    top: 0;
    height: var(--scrollbar-pill-sz);
    background: var(--color-grey-10);
  }
  /* The visible "thumb" — middle drag handle. JS sets `left` and
     `right` from the scrollbar's visible-window state. */
  .scrollbar-thumb {
    position: absolute;
    top: 0; bottom: 0;
    left: 0; right: 0;
    background: var(--color-grey-16);
    border-radius: calc(var(--scrollbar-pill-sz) / 2);
    cursor: grab;
  }
  .scrollbar-thumb.is-dragging { cursor: grabbing; }
  .scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.1); }
  /* End-handle dots sit at the thumb's two edges (not the track's). JS
     positions them with the thumb so they ARE the visible window edges
     — dragging one resizes the window from that side (zoom anchored
     to the opposite side). */
  .scrollbar-end {
    position: absolute;
    top: 50%; transform: translate(-50%, -50%);
    box-sizing: border-box;
    width: var(--scrollbar-end-sz);
    height: var(--scrollbar-end-sz);
    border-radius: 50%;
    background: var(--color-grey-12);
    border: 2px solid var(--color-grey-24);
    cursor: ew-resize;
    transition: border-color 0.12s ease;
    z-index: 2;
  }
  .scrollbar-end:hover,
  .scrollbar-end.is-dragging {
    border-color: var(--color-timeline-primary-highlight);
  }

  /* Playhead is split across two parents so each piece gets clipped to
     its own column:
       - .playhead-line lives inside .lanes-area; its left:0..lanesWidth
         range is already perfectly clamped, so no overflow concerns.
       - .ruler__handle lives inside .ruler-row-inner; the ruler's
         overflow:hidden clips the triangle when it sits near the left
         edge (so it never overlaps the track-headers / utilities column).
     Both elements are positioned by JS using the same px-per-frame.
     Line color is Figma's #C94B4B (muted red); the SVG handle is
     primary-highlight blue. pointer-events:none so they don't intercept
     ruler-scrub drags. */
  .playhead-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 0;
    width: 1px;
    background: #c94b4b;
    pointer-events: none;
    z-index: 5;
  }
  .ruler__handle {
    position: absolute;
    bottom: 0;                /* sit on the ruler/lanes boundary */
    left: 0;                  /* JS sets translateX(-50%) via transform */
    width: 18.58px;
    height: 16px;
    display: block;
    pointer-events: none;
    transform: translateX(-50%);
    z-index: 6;
  }

  /* ---- right gutter (vertical scrollbars, split by V/A divider position) ---- */

  .v-gutter {
    grid-column: 4; grid-row: 2;
    background: var(--color-grey-10);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  /* The v-gutter's two scrollbars use the same flex-share rule as the
     lane stacks so they follow the V/A splitter — drag the divider and
     the video/audio scrollbar regions resize in lockstep with the
     lanes they serve. */
  .v-gutter > .v-scroll:first-of-type {
    flex: 1 1 0;
    flex-grow: var(--va-video-share, 1);
    min-height: 0;
  }
  .v-gutter > .v-scroll:last-of-type {
    flex: 1 1 0;
    flex-grow: var(--va-audio-share, 1);
    min-height: 0;
  }
  /* Vertical scrollbar — same component as horizontal, rotated 90°.
     10px-wide pill that fills the height of its v-scroll cell, with
     10×10 dots at top + bottom. */
  .v-scroll {
    flex: 1 1 auto;
    position: relative;
    display: flex; justify-content: flex-start;
  }
  .v-scroll__track {
    position: relative;
    width: var(--scrollbar-pill-sz);
    height: 100%;
    background: var(--color-grey-10);
  }
  .v-scroll__thumb {
    position: absolute;
    left: 0; right: 0;
    top: 0; bottom: 0;
    background: var(--color-grey-16);
    border-radius: calc(var(--scrollbar-pill-sz) / 2);
    cursor: grab;
  }
  .v-scroll__thumb.is-dragging { cursor: grabbing; }
  .v-scroll__thumb:hover { background: rgba(255, 255, 255, 0.1); }
  .v-scroll__end {
    position: absolute;
    left: 50%; transform: translate(-50%, -50%);
    box-sizing: border-box;
    width: var(--scrollbar-end-sz);
    height: var(--scrollbar-end-sz);
    border-radius: 50%;
    background: var(--color-grey-12);
    border: 2px solid var(--color-grey-24);
    cursor: ns-resize;
    transition: border-color 0.12s ease;
    z-index: 2;
  }
  .v-scroll__end:hover,
  .v-scroll__end.is-dragging {
    border-color: var(--color-timeline-primary-highlight);
  }

  /* The v-gutter splits at the V/A divider line. Two scrollbars stacked,
     with a small inset matching --va-divider-h between them. */
  .v-gutter__divider {
    flex: 0 0 var(--va-divider-h);
    background: var(--color-grey-7);
    box-sizing: content-box;
    border-bottom: 1px solid var(--color-grey-16);
  }
</style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <div class="topbar__timecode" id="timecode">00:00:00:00</div>
  </div>

  <!-- body grid -->
  <div class="body">

    <!-- row 1 -->
    <div class="logo">
      <img class="logo__mark" src="icons/logo.svg" alt="Shotblocks" />
    </div>

    <div class="utilstrip">
      <div class="utilstrip__icon" title="Snap">

      </div>
      <div class="utilstrip__icon" title="Beat Detection">

      </div>
      <div class="utilstrip__icon" title="Markers">

      </div>
      <div class="utilstrip__icon" title="Settings">

      </div>
    </div>
    <div class="ruler-row__gutter-cap"></div>

    <!-- row 2 -->
    <div class="rail">
      <div class="rail__tools" id="rail-tools">

          <span class="icon icon--select" aria-label="Select"></span>

        <div class="rail__tool" title="Razor" data-tool="razor" style="--icon-w:14px;--icon-h:14px;--icon-rot:45deg">
          <span class="icon icon--razor" aria-label="Razor"></span>
        </div>
        <div class="rail__tool" title="Pen" data-tool="pen" style="--icon-w:14px;--icon-h:14px">
          <span class="icon icon--pen" aria-label="Pen"></span>

        <div class="rail__tool" title="Range" data-tool="range" style="--icon-w:15px;--icon-h:12px">
          <span class="icon icon--range" aria-label="Range"></span>

      </div>
      <div class="rail__meter-wrap">
        <div class="rail__meter" title="dB meter">
        <div class="rail__meter-scale">
          <div class="rail__meter-scale__labels">
            <span>6</span><span>0</span><span>-6</span><span>-12</span>
            <span>-20</span><span>-30</span><span>-40</span><span>-50</span><span>-∞</span>
          </div>
          <div class="rail__meter-scale__ticks"></div>
        </div>
        <div class="rail__meter-bars">
          <div class="rail__meter-bars__pair">
            <div class="rail__meter-bar"></div>
            <div class="rail__meter-bar"></div>
          </div>
          <div class="rail__meter-bars__lr">
            <span>L</span><span>R</span>
          </div>

      </div>
      </div>
    </div>

    <div class="headers">
      <div class="stack">
        <div class="stack__videos" id="headers-videos"></div>
        <div class="stack__divider" id="headers-divider"></div>
        <div class="stack__audios" id="headers-audios"></div>
      </div>
    </div>

    <div class="stage">
      <div class="stage__edge-shadow"></div>
      <div class="lanes-area" id="lanes-area">
        <div class="stack">
          <div class="stack__videos" id="lanes-videos"></div>
          <div class="stack__divider" id="lanes-divider"></div>
          <div class="stack__audios" id="lanes-audios"></div>
        </div>
        <div class="playhead-line" id="playhead-line"></div>
      </div>
    </div>

    <div class="h-scroll">
      <div class="scrollbar-track" id="h-scroll-track">
        <div class="scrollbar-thumb" id="h-scroll-thumb"></div>
        <div class="scrollbar-end" id="h-scroll-end-left" title="Zoom from left"></div>
        <div class="scrollbar-end" id="h-scroll-end-right" title="Zoom from right"></div>
      </div>
    </div>

    <div class="v-gutter">
      <div class="v-scroll" title="Video tracks scroll/zoom">
        <div class="v-scroll__track" id="v-video-track">
          <div class="v-scroll__thumb" id="v-video-thumb"></div>
          <div class="v-scroll__end" id="v-video-end-top"></div>
          <div class="v-scroll__end" id="v-video-end-bottom"></div>
        </div>
      </div>
      <div class="stack__divider v-gutter__divider" id="vgutter-divider"></div>
      <div class="v-scroll" title="Audio tracks scroll/zoom">
        <div class="v-scroll__track" id="v-audio-track">
          <div class="v-scroll__thumb" id="v-audio-thumb"></div>
          <div class="v-scroll__end" id="v-audio-end-top"></div>
          <div class="v-scroll__end" id="v-audio-end-bottom"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);

  // -----------------------------------------------------------------
  // On-page debug overlay. WebView2 inside C4D doesn't easily expose
  // DevTools, so mirror console.{log,warn,error} into a floating panel
  // in the corner of the page. Toggle with backtick (`). Disabled by
  // default; flip SHOW_DEBUG_OVERLAY to true to start with it open.
  // -----------------------------------------------------------------
  const SHOW_DEBUG_OVERLAY = false;
  const debugPanel = document.createElement('div');
  debugPanel.id = 'sb-debug-overlay';
  debugPanel.style.cssText = [
    'position:fixed','right:6px','bottom:24px','width:520px','max-height:40vh',
    'overflow:auto','padding:6px 8px','background:rgba(0,0,0,0.85)','color:#cfe',
    'font:11px/1.35 ui-monospace,Consolas,monospace','border:1px solid #333',
    'border-radius:4px','z-index:9999','pointer-events:auto','white-space:pre-wrap',
    'display:' + (SHOW_DEBUG_OVERLAY ? 'block' : 'none')
  ].join(';');
  function debugAppend(level, args) {
    const ts = new Date().toISOString().slice(11, 19);
    const line = document.createElement('div');
    line.style.color = level === 'error' ? '#f88' : level === 'warn' ? '#fc8' : '#cfe';
    const text = args.map(a => {
      try { return typeof a === 'string' ? a : JSON.stringify(a); }
      catch { return String(a); }
    }).join(' ');
    line.textContent = `[${ts}] ${text}`;
    debugPanel.appendChild(line);
    debugPanel.scrollTop = debugPanel.scrollHeight;
  }
  const origLog = console.log.bind(console);
  const origWarn = console.warn.bind(console);
  const origErr = console.error.bind(console);
  console.log   = (...a) => { try { debugAppend('log',  a); } catch {} origLog(...a); };
  console.warn  = (...a) => { try { debugAppend('warn', a); } catch {} origWarn(...a); };
  console.error = (...a) => { try { debugAppend('error', a); } catch {} origErr(...a); };
  window.addEventListener('error', (ev) => {
    debugAppend('error', [`uncaught: ${ev.message} @ ${ev.filename}:${ev.lineno}`]);
  });
  document.addEventListener('DOMContentLoaded', () => document.body.appendChild(debugPanel));
  window.addEventListener('keydown', (ev) => {
    if (ev.key === '`') {
      debugPanel.style.display = debugPanel.style.display === 'none' ? 'block' : 'none';
    }
  });

  // Authoritative state pushed from C++ via PostWebMessage. Visible
  // window is driven by the horizontal scrollbar (state.h.vMin..vMax in
  // frames); pan/zoom of the lanes vertically is driven by the v-video
  // and v-audio scrollbars (units are "track slots").
  const state = {
    fps: 30,
    docFrames: 150,
    currentFrame: 0,
    playing: false,
    // Scrollbar state: vMin..vMax is the visible window over min..max.
    h:      { min: 0, max: 150, vMin: 0, vMax: 150 },
    vVideo: { min: 0, max: 1,   vMin: 0, vMax: 1   },
    vAudio: { min: 0, max: 1,   vMin: 0, vMax: 1   },
    // Track lists. Index 0 = closest to the V/A divider (lowest number
    // for video, lowest number for audio). New tracks are added at the
    // outer ends (top of video stack, bottom of audio stack).
    // Each track carries its own clips array: { id, inFrame, outFrame,
    // sourceName, sourceType }. inFrame/outFrame are inclusive of in,
    // exclusive of out.
    videoTracks: [{ id: 1, name: 'Video 1', clips: [] }],
    audioTracks: [{ id: 1, name: 'Audio 1', clips: [] }],
  };
  // Monotonic clip ID. Unique across all tracks for the session.
  let nextClipId = 1;
  const DEFAULT_CLIP_DURATION_FRAMES = 24;

  function pad2(n) { return (n < 10 ? '0' : '') + n; }

  function formatTimecode(frame, fps) {
    if (!fps || fps <= 0) return '00:00:00:00';
    const f  = Math.max(0, frame | 0);
    const ff = f % fps;
    const ts = Math.floor(f / fps);
    const ss = ts % 60;
    const mm = Math.floor(ts / 60) % 60;
    const hh = Math.floor(ts / 3600);
    return pad2(hh) + ':' + pad2(mm) + ':' + pad2(ss) + ':' + pad2(ff);
  }

  // Pick a label step that keeps numbers readable at the current density.
  // Minor ticks land at every step/4, majors at every step, labels at every step.
  function pickFrameStep(pxPerFrame) {
    const candidates = [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024];
    const minLabelPx = 36;
    for (const s of candidates) {
      if (s * pxPerFrame >= minLabelPx) return s;
    }
    return candidates[candidates.length - 1];
  }

  function layout() {
    const rulerRow = $('ruler-row');
    const ticks    = $('ruler-ticks');
    const nums     = $('ruler-numbers');
    if (!rulerRow || !ticks || !nums) return;

    const inner = $('ruler-row-inner');
    const width = (inner || rulerRow).getBoundingClientRect().width;
    const vMin = state.h.vMin;
    const vMax = state.h.vMax;
    const visibleSpan = Math.max(1, vMax - vMin);
    const pxPerFrame = width / visibleSpan;

    const step = pickFrameStep(pxPerFrame);
    const minorStep = Math.max(1, step / 4) | 0;

    // Snap visible-start to the nearest minor step so ticks land on
    // round frame numbers regardless of pan/zoom offset.
    const firstTick = Math.ceil(vMin / minorStep) * minorStep;
    const lastTick  = Math.floor(vMax / minorStep) * minorStep;

    ticks.innerHTML = '';
    nums.innerHTML  = '';
    for (let f = firstTick; f <= lastTick; f += minorStep) {
      const tick = document.createElement('div');
      tick.className = 'ruler__tick ' + (f % step === 0 ? 'is-major' : 'is-minor');
      tick.style.left = ((f - vMin) * pxPerFrame) + 'px';
      ticks.appendChild(tick);
    }
    const firstLabel = Math.ceil(vMin / step) * step;
    const lastLabel  = Math.floor(vMax / step) * step;
    const labelFrames = new Set();
    labelFrames.add(Math.max(0, Math.ceil(vMin)));
    for (let f = firstLabel; f <= lastLabel; f += step) labelFrames.add(f);
    labelFrames.add(Math.floor(vMax));
    const sorted = [...labelFrames].sort((a, b) => a - b);
    for (const f of sorted) {
      const n = document.createElement('div');
      n.className = 'ruler__number';
      n.textContent = f;
      const x = (f - vMin) * pxPerFrame;
      // Anchor the first and last label to the ruler's left/right edge
      // so they don't get clipped by overflow:hidden.
      if (f === sorted[0]) {
        n.style.left = '0px';
        n.style.transform = 'none';
      } else if (f === sorted[sorted.length - 1]) {
        n.style.left = (width - 1) + 'px';
        n.style.transform = 'translateX(-100%)';
      } else {
        n.style.left = x + 'px';
      }
      nums.appendChild(n);
    }

    positionPlayhead(pxPerFrame);
  }

  function positionPlayhead(pxPerFrameMaybe) {
    const line = $('playhead-line');
    const handle = $('playhead-handle');
    const lanes = document.querySelector('.lanes-area');
    if (!line || !handle || !lanes) return;
    const vMin = state.h.vMin;
    const vMax = state.h.vMax;
    const visibleSpan = Math.max(1, vMax - vMin);
    const pxPerFrame = pxPerFrameMaybe != null
      ? pxPerFrameMaybe
      : (lanes.getBoundingClientRect().width / visibleSpan);
    const f = state.currentFrame;
    const x = (f - vMin) * pxPerFrame;
    // Hide the playhead when it's outside the visible window so it
    // doesn't smear against the left/right edges.
    const visible = f >= vMin && f <= vMax;
    line.style.display = visible ? '' : 'none';
    handle.style.display = visible ? '' : 'none';
    line.style.left = x + 'px';
    handle.style.left = x + 'px';
  }

  function updateTimecode() {
    const tc = $('timecode');
    if (tc) tc.textContent = formatTimecode(state.currentFrame, state.fps);
  }

  // Ruler scrubbing: pointer down + drag anywhere on the ruler band sets
  // the playhead and seeks the C4D document. Optimistically updates the
  // local playhead so the UI feels instant; the C++-side EVMSG_TIMECHANGED
  // round-trip arrives a frame or two later and overwrites with the
  // authoritative frame (which should match).
  function attachScrub() {
    const inner = $('ruler-row-inner');
    if (!inner) return;
    inner.style.cursor = 'ew-resize';

    let dragging = false;
    let lastSentFrame = -1;

    function frameFromEvent(ev) {
      const rect = inner.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, ev.clientX - rect.left));
      const docFrames = Math.max(1, state.docFrames);
      const f = Math.round((x / rect.width) * docFrames);
      return Math.max(0, Math.min(docFrames, f));
    }

    function seek(f) {
      if (f === lastSentFrame) return;
      lastSentFrame = f;
      state.currentFrame = f;
      positionPlayhead();
      updateTimecode();
      sendToHost({ kind: 'seek', frame: f }).catch(err => {
        console.warn('[sb] seek failed:', err && err.message);
      });
    }

    inner.addEventListener('pointerdown', (ev) => {
      if (ev.button !== 0) return;
      dragging = true;
      try { inner.setPointerCapture(ev.pointerId); } catch (e) {}
      seek(frameFromEvent(ev));
      ev.preventDefault();
    });
    inner.addEventListener('pointermove', (ev) => {
      if (!dragging) return;
      seek(frameFromEvent(ev));
    });
    function endDrag(ev) {
      if (!dragging) return;
      dragging = false;
      try { inner.releasePointerCapture(ev.pointerId); } catch (e) {}
    }
    inner.addEventListener('pointerup', endDrag);
    inner.addEventListener('pointercancel', endDrag);
  }

  // Tool palette: exactly one tool active at a time. Click sets local
  // `is-active` immediately and tells C++ which tool the user picked.
  // C++ has no behavior wired to the tool yet — it just acknowledges.
  function attachToolPalette() {
    const tools = $('rail-tools');
    if (!tools) return;
    tools.addEventListener('click', (ev) => {
      const target = ev.target.closest('.rail__tool');
      if (!target || !tools.contains(target)) return;
      const id = target.getAttribute('data-tool');
      if (!id) return;
      for (const el of tools.querySelectorAll('.rail__tool')) {
        el.classList.toggle('is-active', el === target);
      }
      sendToHost({ kind: 'tool', id }).catch(err => {
        console.warn('[sb] tool send failed:', err && err.message);
      });
    });
  }

  // V/A splitter: the divider lives in two places — the headers column
  // and the lanes area — and EITHER is grabbable. Both write the same
  // :root vars (--va-video-share / --va-audio-share), which the
  // flex-grow rules read for both stacks, so they stay vertically
  // locked through the drag. Snaps to dead-center within 6px.
  function attachVaSplitter() {
    const SNAP_PX = 6;

    function setShare(videoShare01) {
      const v = Math.max(0, Math.min(1, videoShare01));
      document.documentElement.style.setProperty('--va-video-share', String(v));
      document.documentElement.style.setProperty('--va-audio-share', String(1 - v));
      // V/A drag changes the v-scrollbar track lengths even though
      // scrollbar state didn't change — reposition thumbs + end-dots.
      if (typeof updateScrollbars === 'function') updateScrollbars();
    }

    function bind(divider, videosEl) {
      if (!divider || !videosEl) return;
      divider.classList.add('is-grabbable');

      let dragging = false;
      let startY = 0;
      let startVideoPx = 0;     // video region height at drag start
      let regionPx = 0;         // (stack height - divider height) at drag start

      divider.addEventListener('pointerdown', (ev) => {
        if (ev.button !== 0) return;
        const dividerRect = divider.getBoundingClientRect();
        // The "region" is the available stack height excluding the
        // divider itself. videosEl's parent is the .stack we live in,
        // so its height matches the stack height.
        const stack = divider.parentElement;
        const stackRect = stack.getBoundingClientRect();
        startY = ev.clientY;
        startVideoPx = videosEl.getBoundingClientRect().height;
        regionPx = Math.max(1, stackRect.height - dividerRect.height);
        dragging = true;
        divider.classList.add('is-dragging');
        try { divider.setPointerCapture(ev.pointerId); } catch (e) {}
        ev.preventDefault();
      });
      divider.addEventListener('pointermove', (ev) => {
        if (!dragging) return;
        let videoPx = startVideoPx + (ev.clientY - startY);
        videoPx = Math.max(0, Math.min(regionPx, videoPx));
        const centerPx = regionPx / 2;
        if (Math.abs(videoPx - centerPx) <= SNAP_PX) videoPx = centerPx;
        setShare(videoPx / regionPx);
      });
      function endDrag(ev) {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('is-dragging');
        try { divider.releasePointerCapture(ev.pointerId); } catch (e) {}
      }
      divider.addEventListener('pointerup', endDrag);
      divider.addEventListener('pointercancel', endDrag);
    }

    bind($('lanes-divider'),   $('lanes-videos'));
    bind($('headers-divider'), $('headers-videos'));
    // The v-gutter splitter uses the gutter's own first .v-scroll as
    // its "videos region" reference. Same flex-share var write means
    // the lanes follow regardless of which divider the user grabs.
    const vgutter = document.querySelector('.v-gutter');
    const vgutterVideos = vgutter ? vgutter.querySelector('.v-scroll') : null;
    bind($('vgutter-divider'), vgutterVideos);

    // Link all three dividers' hover state so hovering any span lights
    // up the whole V/A seam — :hover alone only matches the one element
    // the cursor is over.
    const all = [$('lanes-divider'), $('headers-divider'), $('vgutter-divider')].filter(Boolean);
    function setHover(on) {
      for (const el of all) el.classList.toggle('is-hover', on);
    }
    for (const el of all) {
      el.addEventListener('pointerenter', () => setHover(true));
      el.addEventListener('pointerleave', () => setHover(false));
    }
  }

  // -----------------------------------------------------------------
  // Track rendering. Replaces the hand-written V1/A1 markup with a
  // JS-driven render of state.videoTracks + state.audioTracks. Each
  // side keeps its outermost track furthest from the V/A divider:
  // video stack runs visually top→bottom as [Vn, V(n-1), ..., V1];
  // audio stack runs as [A1, A2, ..., An]. Track id is what shows on
  // the chip; name is the readable label below the eye/M/S icons.
  // -----------------------------------------------------------------

  function videoHeaderHTML(t) {
    return `
      <div class="track-header is-video" data-track="V${t.id}">
        <div class="track-header__twirl"><span class="icon icon--triangle" style="--icon-w:8px;--icon-h:10px;--icon-rot:90deg"></span></div>
        <div class="track-header__lock-wrap">
          <span class="icon icon--lock" style="--icon-w:12px;--icon-h:12px"></span>
        </div>
        <div class="track-header__chip-wrap">
          <div class="track-header__chip">V${t.id}</div>
        </div>
        <div class="track-header__right">
          <div class="track-header__right-col">
            <span class="icon icon--eye" style="--icon-w:18px;--icon-h:18px;background-color:var(--color-timeline-primary-highlight)"></span>
            <div class="track-header__label-wrap">
              <div class="track-header__label">${t.name}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function audioHeaderHTML(t) {
    return `
      <div class="track-header is-audio" data-track="A${t.id}">
        <div class="track-header__twirl"><span class="icon icon--triangle" style="--icon-w:8px;--icon-h:10px;--icon-rot:90deg"></span></div>
        <div class="track-header__lock-wrap">
          <span class="icon icon--lock-locked" style="--icon-w:12px;--icon-h:12px"></span>
        </div>
        <div class="track-header__chip-wrap">
          <div class="track-header__chip">A${t.id}</div>
        </div>
        <div class="track-header__right">
          <div class="track-header__right-col">
            <div class="track-header__icons-row"><span>M</span><span class="s">S</span></div>
            <div class="track-header__label-wrap">
              <div class="track-header__label">${t.name}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderTracks() {
    const hVideos = $('headers-videos');
    const hAudios = $('headers-audios');
    const lVideos = $('lanes-videos');
    const lAudios = $('lanes-audios');
    if (!hVideos || !hAudios || !lVideos || !lAudios) return;

    // Video stack: top → bottom is [Vn, V(n-1), ..., V1]. So we render
    // state.videoTracks reversed.
    const videosOrdered = state.videoTracks.slice().reverse();
    const audiosOrdered = state.audioTracks;

    hVideos.innerHTML = videosOrdered.map(videoHeaderHTML).join('');
    hAudios.innerHTML = audiosOrdered.map(audioHeaderHTML).join('');
    lVideos.innerHTML = videosOrdered.map(t => `<div class="lane" data-track="V${t.id}" data-side="video"></div>`).join('');
    lAudios.innerHTML = audiosOrdered.map(t => `<div class="lane" data-track="A${t.id}" data-side="audio"></div>`).join('');
    renderClips();

    // Track count drives the v-scrollbar range. Default: all visible.
    const wasFullVideo = state.vVideo.vMin === state.vVideo.min && state.vVideo.vMax === state.vVideo.max;
    const wasFullAudio = state.vAudio.vMin === state.vAudio.min && state.vAudio.vMax === state.vAudio.max;
    state.vVideo.max = state.videoTracks.length;
    state.vAudio.max = state.audioTracks.length;
    if (wasFullVideo) { state.vVideo.vMin = 0; state.vVideo.vMax = state.vVideo.max; }
    if (wasFullAudio) { state.vAudio.vMin = 0; state.vAudio.vMax = state.vAudio.max; }
    updateScrollbars();
    applyVerticalZoom('video');
    applyVerticalZoom('audio');
  }

  // Render shot blocks (clips) into their lanes. Called whenever clips
  // change OR the horizontal visible window changes (so we have to
  // recompute left+width). Track structure must already exist —
  // renderTracks() builds it; renderClips() only updates lane contents.
  function shotBlockHTML(clip) {
    const label = clip.sourceName || 'clip';
    return `<div class="shot-block" data-clip="${clip.id}" title="${label}">${label}</div>`;
  }

  function pxPerFrameForLanes() {
    const lanes = document.querySelector('.lanes-area');
    if (!lanes) return 0;
    const w = lanes.getBoundingClientRect().width;
    const visibleSpan = Math.max(1, state.h.vMax - state.h.vMin);
    return w / visibleSpan;
  }

  function renderClips() {
    const pxPerFrame = pxPerFrameForLanes();
    const vMin = state.h.vMin;
    const sides = [
      { tracks: state.videoTracks, container: $('lanes-videos'), prefix: 'V' },
      { tracks: state.audioTracks, container: $('lanes-audios'), prefix: 'A' },
    ];
    for (const side of sides) {
      if (!side.container) continue;
      for (const t of side.tracks) {
        const lane = side.container.querySelector(`.lane[data-track="${side.prefix}${t.id}"]`);
        if (!lane) continue;
        lane.innerHTML = t.clips.map(shotBlockHTML).join('');
        for (const clip of t.clips) {
          const el = lane.querySelector(`.shot-block[data-clip="${clip.id}"]`);
          if (!el) continue;
          const left = (clip.inFrame  - vMin) * pxPerFrame;
          const width = (clip.outFrame - clip.inFrame) * pxPerFrame;
          el.style.left  = left + 'px';
          el.style.width = Math.max(2, width) + 'px';
        }
      }
    }
  }

  // OM-drop handler. C++ sends absolute screen coordinates; convert to
  // viewport-local (subtract WebView2's screenX/Y), then figure out
  // which lane was hit and which frame the X maps to. Drop creates a
  // new clip on that lane at that frame.
  function handleOmDrop(msg) {
    if (!msg || !Array.isArray(msg.items) || msg.items.length === 0) return;
    // C++ already converted absolute screen coords to HtmlViewer viewport
    // coords (via Global2Local + GetItemDim), so we just use them.
    const localX = msg.viewportX;
    const localY = msg.viewportY;
    const targets = document.elementsFromPoint(localX, localY);
    const laneEl = targets.find(el => el.classList && el.classList.contains('lane'));
    if (!laneEl) {
      console.log('[sb] drop missed any lane at', localX, localY);
      return;
    }
    const trackId = laneEl.getAttribute('data-track');     // e.g. "V1" or "A1"
    const side    = laneEl.getAttribute('data-side');      // "video" or "audio"
    const list    = side === 'video' ? state.videoTracks : state.audioTracks;
    const idNum   = parseInt(trackId.slice(1), 10);
    const track   = list.find(t => t.id === idNum);
    if (!track) return;

    // Map drop X within the lane to a frame number.
    const laneRect = laneEl.getBoundingClientRect();
    const xInLane = Math.max(0, localX - laneRect.left);
    const pxPerFrame = pxPerFrameForLanes();
    if (pxPerFrame <= 0) return;
    const dropFrame = Math.round(state.h.vMin + xInLane / pxPerFrame);

    // Drop the first item only for now (multi-select drops later).
    const item = msg.items[0];
    const clip = {
      id: nextClipId++,
      inFrame:  dropFrame,
      outFrame: dropFrame + DEFAULT_CLIP_DURATION_FRAMES,
      sourceName: item.name || 'clip',
      sourceType: item.type | 0,
    };
    track.clips.push(clip);
    renderClips();
    console.log('[sb] dropped', item.name, 'on', trackId, 'at frame', dropFrame);
  }


  // -----------------------------------------------------------------
  // Scrollbar engine: shared between horizontal + both verticals. Each
  // scrollbar has a track, a draggable thumb, and two end-handle dots.
  //
  // - Drag the thumb to pan (both vMin and vMax shift by the same delta).
  // - Drag an end-handle to zoom (only the corresponding edge moves,
  //   anchored to the opposite edge).
  //
  // Position is computed from state in `updateScrollbars()`; user input
  // mutates state then re-runs the scrollbar's onChange callback.
  // -----------------------------------------------------------------

  // Per-axis minimum visible window. Horizontal is in frames (can't
  // zoom in past 4-frame range). Vertical is in track slots and allows
  // fractional values down to 0.1 (= one track at 10x normal height).
  const MIN_SPAN = { h: 4, vVideo: 0.1, vAudio: 0.1 };

  function clampWindow(s, minSpan) {
    if (s.vMax - s.vMin < minSpan) {
      const c = (s.vMin + s.vMax) / 2;
      s.vMin = c - minSpan / 2;
      s.vMax = c + minSpan / 2;
    }
    if (s.vMin < s.min) {
      const shift = s.min - s.vMin;
      s.vMin += shift; s.vMax += shift;
    }
    if (s.vMax > s.max) {
      const shift = s.vMax - s.max;
      s.vMin -= shift; s.vMax -= shift;
    }
    if (s.vMin < s.min) s.vMin = s.min;
    if (s.vMax > s.max) s.vMax = s.max;
  }

  function updateScrollbars() {
    layoutScrollbar('h',      $('h-scroll-track'),  $('h-scroll-thumb'),  $('h-scroll-end-left'),  $('h-scroll-end-right'),  'x');
    layoutScrollbar('vVideo', $('v-video-track'),   $('v-video-thumb'),   $('v-video-end-top'),    $('v-video-end-bottom'),  'y');
    layoutScrollbar('vAudio', $('v-audio-track'),   $('v-audio-thumb'),   $('v-audio-end-top'),    $('v-audio-end-bottom'),  'y');
  }

  function endDotRadius() {
    const sz = parseFloat(getComputedStyle(document.documentElement)
      .getPropertyValue('--scrollbar-end-sz')) || 15;
    return sz / 2;
  }
  function endDotInset() {
    // Dot center at exactly one radius from the track edge so the dot
    // outer edge is flush with the (flat) track edge.
    return endDotRadius();
  }

  function layoutScrollbar(key, track, thumb, endStart, endEnd, axis) {
    if (!track || !thumb || !endStart || !endEnd) return;
    const s = state[key];
    const range = Math.max(1, s.max - s.min);
    const rect = track.getBoundingClientRect();
    const length = axis === 'x' ? rect.width : rect.height;
    // Two different positions in play:
    //   - Dot centers sit on the pill cap apex (`dotCenter`), so the
    //     dot's outer edge is flush with the pill's outer edge.
    //   - Thumb extends from the OUTER side of the start dot all the
    //     way to the OUTER side of the end dot. This makes the thumb
    //     pass UNDER each dot to the pill's end, so there's no notch
    //     of grey-16 pill background visible between the dot and the
    //     thumb — the pill reads as one continuous shape.
    const dotRadius = endDotRadius();
    const dotCenterInset = endDotInset();
    const usable = Math.max(1, length - dotCenterInset * 2);
    const startFrac = (s.vMin - s.min) / range;
    const endFrac   = (s.vMax - s.min) / range;
    const dotStart = dotCenterInset + startFrac * usable;
    const dotEnd   = dotCenterInset + endFrac   * usable;
    const thumbStart = Math.max(0,      dotStart - dotRadius);
    const thumbEnd   = Math.min(length, dotEnd   + dotRadius);

    if (axis === 'x') {
      thumb.style.left  = thumbStart + 'px';
      thumb.style.right = (length - thumbEnd) + 'px';
      endStart.style.left = dotStart + 'px';
      endEnd.style.left   = dotEnd   + 'px';
    } else {
      thumb.style.top    = thumbStart + 'px';
      thumb.style.bottom = (length - thumbEnd) + 'px';
      endStart.style.top = dotStart + 'px';
      endEnd.style.top   = dotEnd   + 'px';
    }
  }

  function attachScrollbar(key, track, thumb, endStart, endEnd, axis, onChange) {
    if (!track || !thumb || !endStart || !endEnd) return;
    const s = () => state[key];
    const minSpan = MIN_SPAN[key];
    const getCoord = (ev) => axis === 'x' ? ev.clientX : ev.clientY;

    function pxPerUnit() {
      const r = track.getBoundingClientRect();
      const length = axis === 'x' ? r.width : r.height;
      // Inset matches layoutScrollbar() — end-dot radius.
      const usable = Math.max(1, length - endDotInset() * 2);
      const range = Math.max(1, s().max - s().min);
      return usable / range;
    }

    function drag(el, getStartState, onMove) {
      let active = false;
      let startCoord = 0;
      let startState = null;
      el.addEventListener('pointerdown', (ev) => {
        if (ev.button !== 0) return;
        active = true;
        startCoord = getCoord(ev);
        startState = getStartState();
        el.classList.add('is-dragging');
        try { el.setPointerCapture(ev.pointerId); } catch (e) {}
        ev.preventDefault();
        ev.stopPropagation();
      });
      el.addEventListener('pointermove', (ev) => {
        if (!active) return;
        const deltaPx = getCoord(ev) - startCoord;
        const deltaUnits = deltaPx / pxPerUnit();
        onMove(startState, deltaUnits);
        clampWindow(s(), minSpan);
        onChange && onChange();
        updateScrollbars();
      });
      const end = (ev) => {
        if (!active) return;
        active = false;
        el.classList.remove('is-dragging');
        try { el.releasePointerCapture(ev.pointerId); } catch (e) {}
      };
      el.addEventListener('pointerup', end);
      el.addEventListener('pointercancel', end);
    }

    // Thumb drag: pan (shift both edges).
    drag(thumb,
      () => ({ vMin: s().vMin, vMax: s().vMax }),
      (start, delta) => {
        s().vMin = start.vMin + delta;
        s().vMax = start.vMax + delta;
      });
    // Start-edge drag: zoom anchored to end.
    drag(endStart,
      () => ({ vMin: s().vMin }),
      (start, delta) => {
        s().vMin = start.vMin + delta;
        if (s().vMin > s().vMax - minSpan) {
          s().vMin = s().vMax - minSpan;
        }
        if (s().vMin < s().min) s().vMin = s().min;
      });
    // End-edge drag: zoom anchored to start.
    drag(endEnd,
      () => ({ vMax: s().vMax }),
      (start, delta) => {
        s().vMax = start.vMax + delta;
        if (s().vMax < s().vMin + minSpan) {
          s().vMax = s().vMin + minSpan;
        }
        if (s().vMax > s().max) s().vMax = s().max;
      });
  }

  function attachAllScrollbars() {
    attachScrollbar('h',
      $('h-scroll-track'),  $('h-scroll-thumb'),
      $('h-scroll-end-left'), $('h-scroll-end-right'),
      'x',
      () => { layout(); renderClips(); /* re-renders ruler + playhead + clip rects */ });
    attachScrollbar('vVideo',
      $('v-video-track'),  $('v-video-thumb'),
      $('v-video-end-top'), $('v-video-end-bottom'),
      'y',
      () => applyVerticalZoom('video'));
    attachScrollbar('vAudio',
      $('v-audio-track'),  $('v-audio-thumb'),
      $('v-audio-end-top'), $('v-audio-end-bottom'),
      'y',
      () => applyVerticalZoom('audio'));
  }

  // Vertical zoom: track height = (visible region height) / (visible
  // track count). The track count is real once add/remove lands; until
  // then this is a no-op so we don't pretend zoom works on a single
  // track. Pan is handled by translateY when multiple tracks exist.
  function applyVerticalZoom(which) {
    const s = which === 'video' ? state.vVideo : state.vAudio;
    const visibleTracks = Math.max(0.01, s.vMax - s.vMin);
    const totalTracks = Math.max(1, s.max - s.min);
    if (totalTracks <= 1) return;     // single track: zoom is a no-op
    const sideEl = which === 'video'
      ? document.querySelector('.lanes-area .stack__videos')
      : document.querySelector('.lanes-area .stack__audios');
    if (!sideEl) return;
    const regionPx = sideEl.getBoundingClientRect().height;
    const trackPx = regionPx / visibleTracks;
    const cssVar = which === 'video' ? '--video-track-h' : '--audio-track-h';
    document.documentElement.style.setProperty(cssVar, trackPx + 'px');
  }

  renderTracks();
  layout();
  updateTimecode();
  updateScrollbars();
  attachScrub();
  attachToolPalette();
  attachVaSplitter();
  attachAllScrollbars();
  window.addEventListener('resize', () => { layout(); updateScrollbars(); renderClips(); });

  // Suppress browser-level page zoom. Inside a docked DAW panel, Ctrl+wheel
  // and Ctrl+/Ctrl-/Ctrl0 should not scale the whole UI. The wheel handler
  // is registered passive:false so preventDefault() takes effect.
  window.addEventListener('wheel', (e) => {
    if (e.ctrlKey) e.preventDefault();
  }, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (!e.ctrlKey) return;
    // '=' is the unshifted '+'. NumpadAdd/NumpadSubtract via e.key '+'/'-'.
    if (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0') {
      e.preventDefault();
    }
  });

  // WebView2 persists page zoom per origin, so a Ctrl+wheel before we
  // wired the suppressor above can leave the page scaled even after
  // redeploy. Snap any non-1 zoom back to 1 on every load.
  if (document.body && document.body.style) document.body.style.zoom = '1';

  // JS->C++ bridge.
  // ---------------
  // Both Maxon-blessed paths (SetWebMessageCallback, SetResourceRequestInterceptCallback)
  // are dead in C4D 2026's HtmlViewer. The host runs a tiny HTTP server on
  // 127.0.0.1:<port>; it tells us the port via a {kind:"hello",port:N}
  // message on first navigate. Until that arrives we queue outbound calls.
  let hostPort = 0;
  const pendingSends = [];

  function flushPending() {
    while (pendingSends.length) {
      const { obj, resolve, reject } = pendingSends.shift();
      doFetch(obj).then(resolve, reject);
    }
  }

  function doFetch(obj) {
    // text/plain is a CORS "simple request" content type, so the browser
    // skips the OPTIONS preflight entirely. The body is still JSON; the
    // C++ side parses it regardless of the Content-Type header.
    return fetch('http://127.0.0.1:' + hostPort + '/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(obj),
    }).then(r => r.text()).then(t => {
      try { return JSON.parse(t); } catch { return { raw: t }; }
    });
  }

  function sendToHost(obj) {
    if (hostPort) return doFetch(obj);
    return new Promise((resolve, reject) => {
      pendingSends.push({ obj, resolve, reject });
    });
  }

  // Inbound C++->JS listener.
  if (window.chrome && window.chrome.webview && window.chrome.webview.addEventListener) {
    window.chrome.webview.addEventListener('message', (ev) => {
      const raw = typeof ev.data === 'string' ? ev.data : String(ev.data);
      let msg;
      try { msg = JSON.parse(raw); } catch { console.log('[sb] non-JSON from host:', raw); return; }
      if (msg.kind === 'hello') {
        hostPort = msg.port | 0;
        console.log('[sb] host hello, port=' + hostPort);
        flushPending();
        // The ping prompts C++ to reply with a doc-info + tick so the UI
        // has authoritative state immediately rather than waiting for the
        // next Timer or EVMSG_TIMECHANGED.
        sendToHost({ kind: 'ping', t: Date.now() })
          .then(ack => console.log('[sb] ping ack:', ack))
          .catch(err => console.warn('[sb] ping failed:', err.message));
        return;
      }
      if (msg.kind === 'doc-info') {
        if (typeof msg.fps === 'number' && msg.fps > 0) state.fps = msg.fps;
        if (typeof msg.docFrames === 'number' && msg.docFrames > 0) {
          const wasFullView = state.h.vMin === state.h.min && state.h.vMax === state.h.max;
          state.docFrames = msg.docFrames;
          state.h.max = msg.docFrames;
          // Auto-fit the visible window to the new doc range only if the
          // user hadn't already zoomed/panned. Preserves their view if they
          // had one.
          if (wasFullView) {
            state.h.vMin = 0;
            state.h.vMax = msg.docFrames;
          }
        }
        layout();
        updateTimecode();
        updateScrollbars();
        return;
      }
      if (msg.kind === 'tick') {
        if (typeof msg.fps === 'number' && msg.fps > 0) state.fps = msg.fps;
        if (typeof msg.frame === 'number') state.currentFrame = msg.frame;
        state.playing = !!msg.playing;
        positionPlayhead();
        updateTimecode();
        return;
      }
      if (msg.kind === 'om-drop') {
        handleOmDrop(msg);
        return;
      }
      console.log('[sb] host->', msg);
    });
  }
})();
</script>

</body>
</html>
