<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shotblocks v2 — Demo</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #1e1e1e;
    --fg: #e6e6e6;
    --muted: #8a8a8a;
    --accent: #4a9eff;
    --ok: #4ade80;
    --warn: #fbbf24;
    --panel: #2a2a2a;
    --border: #3a3a3a;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100%; }
  body { display: flex; flex-direction: column; padding: 16px; gap: 16px; box-sizing: border-box; }
  h1 { font-size: 14px; font-weight: 600; margin: 0; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .row { display: flex; align-items: baseline; gap: 12px; margin: 6px 0; }
  .label { color: var(--muted); width: 80px; }
  .value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .value.playing { color: var(--ok); }
  .value.stopped { color: var(--warn); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 4px;
           padding: 8px 14px; font: inherit; font-weight: 600; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  button:active { filter: brightness(0.9); }
  .log { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 11px;
         color: var(--muted); max-height: 120px; overflow-y: auto; }
  .log .ok { color: var(--ok); }
  .log .warn { color: var(--warn); }
</style>
</head>
<body>

<h1>Shotblocks v2 — Demo</h1>

<div class="panel">
  <div class="row"><span class="label">Frame</span><span class="value" id="frame">—</span></div>
  <div class="row"><span class="label">FPS</span><span class="value" id="fps">—</span></div>
  <div class="row"><span class="label">Playing</span><span class="value" id="playing">—</span></div>
</div>

<div class="panel">
  <button id="ping">Ping C4D</button>
  <span id="ping-result" style="margin-left: 12px; color: var(--muted);"></span>
</div>

<div class="panel">
  <div style="color: var(--muted); margin-bottom: 6px;">Log</div>
  <div class="log" id="log"></div>
</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const log = (msg, cls) => {
    const el = document.createElement('div');
    if (cls) el.className = cls;
    el.textContent = msg;
    $('log').prepend(el);
  };

  // C4D's HtmlViewerCustomGui posts messages via window.chrome.webview
  // (standard WebView2 surface). PostWebMessage(maxon::String) on the
  // C++ side delivers a 'message' event here; postMessage() here is
  // delivered to the SetWebMessageCallback registered in C++.
  const host = (window.chrome && window.chrome.webview) ? window.chrome.webview : null;
  if (!host) {
    log('window.chrome.webview unavailable — messages will not flow', 'warn');
  } else {
    log('webview bridge ready', 'ok');
  }

  const sendToHost = (obj) => {
    if (!host) return;
    try { host.postMessage(JSON.stringify(obj)); }
    catch (e) { log('postMessage failed: ' + e.message, 'warn'); }
  };

  const onHostMessage = (raw) => {
    let msg;
    try { msg = JSON.parse(raw); } catch { log('non-JSON from host: ' + raw); return; }
    if (msg.kind === 'tick') {
      $('frame').textContent = msg.frame;
      $('fps').textContent = msg.fps;
      const playingEl = $('playing');
      playingEl.textContent = msg.playing ? 'yes' : 'no';
      playingEl.className = 'value ' + (msg.playing ? 'playing' : 'stopped');
    } else if (msg.kind === 'pong') {
      $('ping-result').textContent = 'pong (' + msg.frame + ')';
      log('pong received', 'ok');
    } else {
      log('unknown message kind: ' + msg.kind);
    }
  };

  if (host) {
    host.addEventListener('message', (event) => {
      // event.data is what C++ posted.
      onHostMessage(typeof event.data === 'string' ? event.data : String(event.data));
    });
  }

  $('ping').addEventListener('click', () => {
    $('ping-result').textContent = '...';
    log('ping');
    sendToHost({ kind: 'ping', t: Date.now() });
  });

  log('demo page loaded');
})();
</script>

</body>
</html>
